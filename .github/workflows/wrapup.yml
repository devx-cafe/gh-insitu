name: wrapup
on:
  workflow_dispatch:

  push:
    branches:
      - "[0-9]*" # Isue branches
      - "copilot/*" # Copilot running in Agentic mode pushes branches with this prefix as default

concurrency:
  group: "wrapup"
  cancel-in-progress: false


jobs:
  trunk-worthy:
    name: Check trunk worthyness
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mark checks as pending
        run: |
          make build
          ./insitu run --mark-pending

      - name: Set up runner environment
        uses: ./.github/actions/prep-runner

      - name: Run checks
        run: ./insitu run
