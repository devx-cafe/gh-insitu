# .insitu.yml - valid complete configuration
defaults:
  die-on-error: true
  timeout: 5m
  verbose: false

inventory:
  - id: "hello"
    name: "Say Hello"
    command: "echo hello"

  - id: "build"
    name: "Build"
    command: "make build"
    timeout: 10m

  - id: "coverage"
    name: "Unit Test with Coverage"
    command: "make coverage"
    die-on-error: false

waves:
  - id: "static"
    name: "Static Analysis"
    parallel: true
    checks:
      - "hello"
      - "build"

  - id: "test"
    name: "Post-Build Validation"
    parallel: false
    checks:
      - "coverage"
